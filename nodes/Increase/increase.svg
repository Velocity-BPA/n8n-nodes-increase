<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="increaseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="12" fill="url(#increaseGradient)"/>
  <g fill="white">
    <!-- Upward arrow representing increase/growth -->
    <polygon points="50,15 70,40 58,40 58,70 42,70 42,40 30,40"/>
    <!-- Dollar sign base -->
    <rect x="45" y="72" width="10" height="3" rx="1"/>
    <rect x="45" y="78" width="10" height="3" rx="1"/>
    <!-- Bank columns -->
    <rect x="20" y="60" width="6" height="25" rx="1"/>
    <rect x="74" y="60" width="6" height="25" rx="1"/>
    <!-- Base line -->
    <rect x="15" y="85" width="70" height="4" rx="2"/>
  </g>
</svg>
